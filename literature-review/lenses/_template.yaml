# Domain Lens Template
# Copy this file and fill in the fields to create a new domain lens.
# Lenses are loaded by the read skill to guide deep paper appraisal.

lens_id: ""                    # kebab-case, e.g. "power-electronics"
name: ""                       # Human-readable, e.g. "Power Electronics"
description: ""                # One-paragraph description of the domain

# Research-fit coordinates: what this domain cares about
research_fit_coordinates:
  - dimension: ""              # e.g. "Topology novelty"
    description: ""            # What counts as novel in this dimension
    signals: []                # Positive indicators
    anti_signals: []           # Negative indicators

# How to classify a paper's contribution type
contribution_type_classification:
  - type: ""                   # e.g. "New topology", "Control method", "Modulation scheme"
    description: ""
    typical_sections: []       # Where to find key evidence

# Technical reconstruction checklist for deep reading
technical_checklist:
  - item: ""                   # e.g. "What is the rated power and switching frequency?"
    category: ""               # e.g. "Specifications", "Topology", "Control", "Validation"

# Evidence quality ladder (domain-specific)
evidence_quality_ladder:
  - level: 1
    label: ""                  # e.g. "Application-scale prototype (>1 kW)"
    weight: 1.0                # 0.0–1.0
  - level: 2
    label: ""                  # e.g. "Low-power prototype (<1 kW, lab)"
    weight: 0.7
  - level: 3
    label: ""                  # e.g. "HIL / Controller-HIL"
    weight: 0.5
  - level: 4
    label: ""                  # e.g. "Simulation only"
    weight: 0.3
  - level: 5
    label: ""                  # e.g. "No validation"
    weight: 0.0

# Common red flags in this domain
red_flags:
  - flag: ""                   # e.g. "No loss breakdown provided"
    severity: warning          # warning | critical
    explanation: ""

# Transfer questions: what to ask when adapting this paper's ideas
transfer_questions:
  - question: ""               # e.g. "Would this topology work with GaN instead of Si?"
    rationale: ""
